<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天氣看板</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="controls">
        <label for="dataType">資料來源：</label>
        <select id="dataType">
            <option value="observation">觀測 (PBLAP)</option>
            <option value="forecast">預報 (CWA)</option>
        </select>

        <label for="city" id="cityLabel" style="display: none;">縣市：</label>
        <select id="city" style="display: none;">
            <option value="臺北市">臺北市</option>
            <option value="新北市">新北市</option>
            <option value="桃園市">桃園市</option>
            <option value="臺中市">臺中市</option>
            <option value="臺南市">臺南市</option>
            <option value="高雄市">高雄市</option>
            <option value="基隆市">基隆市</option>
            <option value="新竹縣">新竹縣</option>
            <option value="新竹市">新竹市</option>
            <option value="苗栗縣">苗栗縣</option>
            <option value="彰化縣">彰化縣</option>
            <option value="南投縣">南投縣</option>
            <option value="雲林縣">雲林縣</option>
            <option value="嘉義縣">嘉義縣</option>
            <option value="嘉義市">嘉義市</option>
            <option value="屏東縣">屏東縣</option>
            <option value="宜蘭縣">宜蘭縣</option>
            <option value="花蓮縣">花蓮縣</option>
            <option value="臺東縣">臺東縣</option>
            <option value="澎湖縣">澎湖縣</option>
            <option value="金門縣">金門縣</option>
            <option value="連江縣">連江縣</option>
        </select>

        <label for="forecastInterval" id="forecastIntervalLabel" style="display: none;">預報區間：</label>
        <select id="forecastInterval" style="display: none;">
            <option value="1d">日 (單日最高/低溫)</option>
            <option value="6h" selected>逐6/12小時 (MinT/MaxT)</option>
        </select>

        <label for="startDate">開始日期：</label>
        <input type="date" id="startDate">

        <label for="endDate">結束日期：</label>
        <input type="date" id="endDate">

        <label for="chartType">圖表類型：</label>
        <select id="chartType">
            <option value="candlestick">K線 (最高/最低/開盤/收盤溫度)</option>
            <option value="line">折線 (平均溫度)</option>
        </select>

        <label for="interval">統計區間：</label>
        <select id="interval">
            <option value="1m">分鐘</option>
            <option value="1h">小時 (整點開盤)</option>
            <option value="4h">4小時 (0, 4, 8...時整點)</option>
            <option value="1d" selected>日 (每日8點開盤)</option>
            <option value="1mo">月</option>
        </select>
        
        <button id="searchBtn">查詢資料</button>
    </div>

    <div id="chart"></div>

    <script src="script.js"></script>
</body>
</html>
