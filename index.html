<!DOCTYPE html>
<html lang="zh-Hant" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天氣看板</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body class="bg-dark text-light d-flex flex-column" style="height: 100dvh; overflow: hidden;">

<div class="container-xl py-3 d-flex flex-column h-100 overflow-y-auto">
    <div class="d-flex align-items-center justify-content-center mb-3 flex-shrink-0">
        <h2 class="fw-bold m-0 fs-4 fs-md-2"><i class="bi bi-cloud-sun"></i> 天氣看板</h2>
    </div>

    <div class="card bg-secondary text-white shadow-sm mb-3 border-0 flex-shrink-0">
        <div class="card-body p-3">
            <div class="row g-2 g-md-3">
                
                <!-- 控制群組：資料來源 -->
                <div class="col-lg-2 col-md-4 col-sm-6">
                    <label for="dataType" class="form-label text-light">資料來源</label>
                    <select id="dataType" class="form-select bg-dark text-white border-secondary">
                        <option value="observation">觀測 (PBLAP)</option>
                        <option value="forecast">預報 (CWA)</option>
                        <option value="openweathermap">預報 (OpenWeatherMap)</option>
                    </select>
                </div>

                <!-- 控制群組：預報專用 -->
                <div class="col-lg-2 col-md-4 col-sm-6 d-none" id="cityWrapper">
                    <label for="city" id="cityLabel" class="form-label text-light">縣市</label>
                    <select id="city" class="form-select bg-dark text-white border-secondary">
                        <option value="臺北市">臺北市</option>
                        <option value="新北市">新北市</option>
                        <option value="桃園市">桃園市</option>
                        <option value="臺中市">臺中市</option>
                        <option value="臺南市">臺南市</option>
                        <option value="高雄市">高雄市</option>
                        <option value="基隆市">基隆市</option>
                        <option value="新竹縣">新竹縣</option>
                        <option value="新竹市">新竹市</option>
                        <option value="苗栗縣">苗栗縣</option>
                        <option value="彰化縣">彰化縣</option>
                        <option value="南投縣">南投縣</option>
                        <option value="雲林縣">雲林縣</option>
                        <option value="嘉義縣">嘉義縣</option>
                        <option value="嘉義市">嘉義市</option>
                        <option value="屏東縣">屏東縣</option>
                        <option value="宜蘭縣">宜蘭縣</option>
                        <option value="花蓮縣">花蓮縣</option>
                        <option value="臺東縣">臺東縣</option>
                        <option value="澎湖縣">澎湖縣</option>
                        <option value="金門縣">金門縣</option>
                        <option value="連江縣">連江縣</option>
                    </select>
                </div>

                <div class="col-lg-2 col-md-4 col-sm-6 d-none" id="forecastIntervalWrapper">
                    <label for="forecastInterval" id="forecastIntervalLabel" class="form-label text-light">預報區間</label>
                    <select id="forecastInterval" class="form-select bg-dark text-white border-secondary">
                        <option value="1d">日 (單日最高/低溫)</option>
                        <option value="6h" selected>逐6/12小時 (MinT/MaxT)</option>
                    </select>
                </div>

                <!-- 控制群組：觀測專用 -->
                <div class="col-lg-2 col-md-4 col-sm-6 obs-only">
                    <label for="startDate" class="form-label text-light">開始日期</label>
                    <input type="date" id="startDate" class="form-control bg-dark text-white border-secondary">
                </div>

                <div class="col-lg-2 col-md-4 col-sm-6 obs-only">
                    <label for="endDate" class="form-label text-light">結束日期</label>
                    <input type="date" id="endDate" class="form-control bg-dark text-white border-secondary">
                </div>
                
                <div class="col-lg-2 col-md-4 col-sm-6 obs-only">
                    <label for="interval" class="form-label text-light">統計區間</label>
                    <select id="interval" class="form-select bg-dark text-white border-secondary">
                        <option value="1m">分鐘</option>
                        <option value="1h" selected>小時 (整點)</option>
                        <option value="4h">4小時 (0/4/8時)</option>
                        <option value="1d">日 (08:00開盤)</option>
                        <option value="1mo">月 (08:00開盤)</option>
                    </select>
                </div>

                <!-- 觀測專用按鈕，放置在新的一列 -->
                <div class="col-lg-4 col-md-12 col-sm-12 obs-only mt-3 mt-lg-0">
                    <label class="form-label d-none d-lg-block">&nbsp;</label>
                    <div id="obsDateButtons" class="d-flex gap-1 gap-md-2">
                        <button id="prevMonthBtn" class="btn btn-outline-light flex-fill text-nowrap px-1 date-btn"><i class="bi bi-chevron-double-left d-none d-sm-inline"></i> 上月</button>
                        <button id="prevDayBtn" class="btn btn-outline-light flex-fill text-nowrap px-1 date-btn"><i class="bi bi-chevron-left d-none d-sm-inline"></i> 前日</button>
                        <button id="todayBtn" class="btn btn-outline-light flex-fill text-nowrap px-1 date-btn">今日</button>
                        <button id="nextDayBtn" class="btn btn-outline-light flex-fill text-nowrap px-1 date-btn">後日 <i class="bi bi-chevron-right d-none d-sm-inline"></i></button>
                        <button id="nextMonthBtn" class="btn btn-outline-light flex-fill text-nowrap px-1 date-btn">下月 <i class="bi bi-chevron-double-right d-none d-sm-inline"></i></button>
                    </div>
                </div>

                <!-- 控制群組：氣象變數 -->
                <div class="col-lg-2 col-md-4 col-sm-6">
                    <label for="weatherVariable" class="form-label text-light">氣象變數</label>
                    <select id="weatherVariable" class="form-select bg-dark text-white border-secondary">
                        <option value="temp">溫度</option>
                        <option value="rh" class="obs-only">相對濕度</option>
                        <option value="ws" class="obs-only">風速風向</option>
                        <option value="p" class="obs-only">氣壓</option>
                        <option value="pr" class="obs-only">累積降雨</option>
                        <option value="sr" class="obs-only">太陽輻射</option>
                    </select>
                </div>

                <!-- 控制群組：圖表類型 -->
                <div class="col-lg-2 col-md-4 col-sm-6">
                    <label for="chartStyle" class="form-label text-light">圖表類型</label>
                    <select id="chartStyle" class="form-select bg-dark text-white border-secondary">
                        <!-- 選項會透過 JS 動態產生 -->
                    </select>
                </div>

                <!-- Push search button to the right -->
                <div class="col-lg-2 col-md-12 col-sm-12 ms-auto mt-4 mt-lg-0 align-self-end">
                    <label class="form-label d-none d-lg-block">&nbsp;</label>
                    <button id="searchBtn" class="btn btn-primary w-100 fw-bold shadow-sm">查詢資料</button>
                </div>
                
            </div>
        </div>
    </div>

    <!-- Chart Container -->
    <div class="card bg-dark border-secondary shadow-sm overflow-hidden chart-card flex-grow-1 d-flex flex-column" style="min-height: 300px;">
        <div class="card-body p-0 position-relative flex-grow-1">
            <div id="chart" class="position-absolute top-0 start-0 w-100 h-100"></div>
        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Bootstrap Icons (Optional but nice) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="script.js"></script>
</body>
</html>
